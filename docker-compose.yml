version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: capsule_postgres
    environment:
      POSTGRES_DB: capsule_db
      POSTGRES_USER: capsule
      POSTGRES_PASSWORD: capsule
    ports:
      - "5432:5432"
    volumes:
      - capsule_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: capsule_redis
    ports:
      - "6380:6379"

  elasticmq:
    image: softwaremill/elasticmq-native
    container_name: capsule_elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf

volumes:
  capsule_pg_data:
