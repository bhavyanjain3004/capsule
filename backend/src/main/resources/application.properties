# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/capsule_db
spring.datasource.username=capsule
spring.datasource.password=capsule
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Mail — PRODUCTION (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Cloudflare R2 (S3-compatible)
aws.region=auto
aws.access-key=${R2_ACCESS_KEY}
aws.secret-key=${R2_SECRET_KEY}
aws.s3.bucket=${R2_BUCKET:capsule-files}
aws.s3.endpoint=${R2_ENDPOINT}
# R2 endpoint format: https://<accountid>.r2.cloudflarestorage.com

# SQS
aws.sqs.queue-url=${SQS_QUEUE_URL}

# Encryption
capsule.master-key=${CAPSULE_MASTER_KEY}

# AI
ai.enabled=false
ai.api-key=${AI_API_KEY:placeholder}
ai.timeout-seconds=3

# App
capsule.base-url=https://yourcapsule.app
capsule.presigned-url-expiry-minutes=15
server.port=8080
