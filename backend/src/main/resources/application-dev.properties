# Overrides for local development — never commit real secrets

# Show SQL in dev
spring.jpa.show-sql=true

# Mail — Mailtrap (dev fake inbox)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=YOUR_MAILTRAP_USERNAME
spring.mail.password=YOUR_MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SQS — ElasticMQ local mock
aws.sqs.queue-url=http://localhost:9324/000000000000/capsule-unlock-queue
aws.region=us-east-1
aws.access-key=local
aws.secret-key=local

# R2 — use local filesystem mock in dev (StorageService will check this flag)
storage.mode=local
storage.local-path=./uploads

# Encryption — dev only throwaway key (32 bytes hex)
capsule.master-key=YOUR_OPENSSL_RAND_OUTPUT_HERE

# AI — disabled in dev until API key is wired
ai.enabled=false

# Base URL
capsule.base-url=http://localhost:3000
